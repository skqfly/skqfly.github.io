<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">skqfly balanced sigma core mark</title>
  <desc id="desc">A balanced four-direction sigma core mark with a filled diamond center.</desc>
  <defs>
    <mask id="center-hole">
      <rect x="0" y="0" width="64" height="64" fill="white"/>
      <circle cx="32" cy="32" r="2.2" fill="black"/>
    </mask>
    <g id="balanced-arm">
      <g transform="translate(32 20) rotate(-90) scale(0.56)">
        <path d="M13 -13H-10.8L1 0L-10.8 13H13V7.1H2.7L9.6 0L2.7 -7.1H13V-13Z" fill="#24211f"/>
      </g>
    </g>
  </defs>
  <g transform="translate(32 32) scale(1.3) translate(-32 -32)">
    <use href="#balanced-arm"/>
    <use href="#balanced-arm" transform="rotate(90 32 32)"/>
    <use href="#balanced-arm" transform="rotate(180 32 32)"/>
    <use href="#balanced-arm" transform="rotate(270 32 32)"/>
    <path d="M32 23.3L40.7 32L32 40.7L23.3 32L32 23.3Z" fill="#24211f" mask="url(#center-hole)"/>
  </g>
</svg>
